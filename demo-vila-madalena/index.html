<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Atendente IA · Vila Madalena Bar (demo)</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0b08;--bg2:#151009;--card:#1c1610;--gold:#d4af37;--gold2:#efd98a;--wa:#25d366;
    --text:#f4ecdd;--muted:#b6a789;--line:rgba(212,175,55,.18)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Manrope',system-ui,sans-serif;background:
    radial-gradient(1000px 600px at 50% -10%,#241a0c 0%,var(--bg) 55%),var(--bg);
    color:var(--text);min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px}

  .demo-wrap{width:100%;max-width:440px}
  .demo-tag{text-align:center;color:var(--muted);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
  .demo-tag b{color:var(--gold2)}

  .phone{background:#0a0806;border:1px solid var(--line);border-radius:26px;overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,.6);display:flex;flex-direction:column;height:min(760px,86vh)}
  .head{background:linear-gradient(180deg,#1b140b,#140f08);display:flex;align-items:center;gap:12px;padding:15px 16px;border-bottom:1px solid var(--line)}
  .av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));
    display:flex;align-items:center;justify-content:center;color:#1a1206;font-family:'Playfair Display',serif;font-weight:700;font-size:20px}
  .hname{font-family:'Playfair Display',serif;font-size:17px;line-height:1.1}
  .hname small{display:block;font-family:'Manrope';color:var(--wa);font-size:12px;font-weight:500;margin-top:2px}

  .body{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;
    background-image:radial-gradient(rgba(255,255,255,.02) 1px,transparent 1px);background-size:16px 16px}
  .bub{max-width:84%;padding:10px 14px;border-radius:15px;font-size:14.5px;line-height:1.45;white-space:pre-line;animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .bub.in{background:#241c11;border:1px solid var(--line);border-bottom-left-radius:4px;align-self:flex-start}
  .bub.out{background:#0b3d2b;border:1px solid rgba(37,211,102,.25);border-bottom-right-radius:4px;align-self:flex-end;color:#dffbe9}
  .bub.in b{color:var(--gold2)}
  .typing{align-self:flex-start;display:flex;gap:5px;padding:12px 15px;background:#241c11;border:1px solid var(--line);border-radius:15px;border-bottom-left-radius:4px}
  .typing span{width:7px;height:7px;border-radius:50%;background:#b6a789;animation:blink 1.1s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

  .chips{display:flex;gap:8px;flex-wrap:wrap;padding:0 14px 10px}
  .chip{background:rgba(212,175,55,.1);border:1px solid var(--line);color:var(--gold2);font-size:13px;font-weight:600;
    padding:8px 14px;border-radius:50px;cursor:pointer;transition:.2s}
  .chip:hover{background:rgba(212,175,55,.2);border-color:var(--gold)}

  .lnk{display:inline-flex;align-items:center;gap:7px;margin-top:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));
    color:#1a1206;font-weight:700;font-size:13.5px;padding:9px 15px;border-radius:11px;text-decoration:none}
  .bub.in .lnk:hover{filter:brightness(1.05)}

  .inbar{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line);background:#0f0b07}
  .inbar input{flex:1;background:#1c1610;border:1px solid var(--line);border-radius:50px;color:var(--text);
    padding:11px 16px;font-size:14px;font-family:'Manrope';outline:none}
  .inbar input:focus{border-color:var(--gold)}
  .inbar button{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));
    color:#1a1206;font-size:18px;cursor:pointer;flex:0 0 auto}

  .note{text-align:center;color:var(--muted);font-size:11.5px;margin-top:12px;line-height:1.5}
  .note a{color:var(--gold2)}
</style>
</head>
<body>
  <div class="demo-wrap">
    <div class="demo-tag">Demonstração · Atendente de IA <b>Zebubit</b></div>
    <div class="phone">
      <div class="head">
        <div class="av">V</div>
        <div class="hname">Vila Madalena Bar<small>● online agora</small></div>
      </div>
      <div class="body" id="chat"></div>
      <div class="chips" id="chips"></div>
      <div class="inbar">
        <input id="inp" placeholder="Escreva sua mensagem..." autocomplete="off">
        <button id="send" aria-label="Enviar">➤</button>
      </div>
    </div>
    <div class="note">Isto é uma demonstração do Atendente de IA da <b>Zebubit</b> para o Vila Madalena Bar.<br>Cardápio e reservas respondidos automaticamente no WhatsApp, 24h.</div>
  </div>

<script>
  const chat=document.getElementById('chat'), chipsEl=document.getElementById('chips'),
        inp=document.getElementById('inp'), send=document.getElementById('send');

  /* ====== CONFIG (troque pelas URLs/infos reais) ====== */
  const WHATS='553434797530';                                   // WhatsApp do Vila Madalena
  const CARDAPIO_URL='https://biovenda.app.br/modelos/vilamadalena/cardapio.html';  // link do cardápio online
  const ENDERECO='Av. Santos Dumont, 1520 - Santa Inês, Uberaba - MG';
  const RESERVA_URL='https://wa.me/'+WHATS+'?text='+encodeURIComponent('Quero reservar uma mesa no Vila Madalena');
  const MAPS_URL='https://www.google.com/maps/search/'+encodeURIComponent('Vila Madalena Bar, '+ENDERECO);
  const WA_HUMANO='https://wa.me/'+WHATS+'?text='+encodeURIComponent('Oi! Vim pelo atendimento e quero falar com a equipe');
  const HORARIO='🗓️ Quarta e quinta: 17h30 às 00h\n🗓️ Sexta: 17h30 às 01h\n🗓️ Sábado: 11h30 às 01h\n🗓️ Domingo: 11h30 às 21h\n🚫 Segunda e terça: fechado';
  /* ==================================================== */

  const btn=(url,txt)=>'<br><a class="lnk" href="'+url+'" target="_blank" rel="noopener">'+txt+'</a>';
  const HUMANO='Falar com atendente';
  let res=null;
  function reservaFlow(text){
    const num=(text.match(/\d+/)||[])[0];
    if(res.step==='pessoas'){ res.pessoas=num||'2'; res.step='dia';
      botSay('Perfeito, mesa para <b>'+res.pessoas+'</b> pessoas 🍽️\nPara qual dia?',['Sexta','Sábado','Domingo','Outro dia']); return; }
    if(res.step==='dia'){ res.dia=text; res.step='hora';
      botSay('Anotado: <b>'+res.dia+'</b>. Qual horário fica melhor?',['19h','20h','21h','22h']); return; }
    if(res.step==='hora'){ res.hora=text; res.step='nome';
      botSay('Ótimo! Por último, me diz o <b>nome</b> pra deixar a reserva no sistema.'); return; }
    if(res.step==='nome'){ res.nome=text.replace(/[^\wÀ-ú\s]/g,'').trim()||'Cliente'; const r=res; res=null;
      botSay(['✅ <b>Reserva confirmada!</b>\n🍽️ Mesa para '+r.pessoas+'\n🗓️ '+r.dia+' às '+r.hora+'\n👤 Em nome de '+r.nome,
        'Já registrei e avisei a equipe. Te esperamos pra curtir a boemia! 🍻\nQualquer mudança, é só me chamar por aqui.'],
        ['Ver cardápio','Onde fica',HUMANO]); return; }
  }

  function add(text,who){const b=document.createElement('div');b.className='bub '+who;b.innerHTML=text;chat.appendChild(b);chat.scrollTop=chat.scrollHeight;return b;}
  function typing(){const t=document.createElement('div');t.className='typing';t.innerHTML='<span></span><span></span><span></span>';chat.appendChild(t);chat.scrollTop=chat.scrollHeight;return t;}
  function setChips(arr){chipsEl.innerHTML='';(arr||[]).forEach(c=>{const s=document.createElement('div');s.className='chip';s.textContent=c;s.onclick=()=>handle(c);chipsEl.appendChild(s);});}

  function botSay(msgs,chips){
    const list=Array.isArray(msgs)?msgs:[msgs];
    setChips([]);
    let i=0;
    (function nxt(){
      if(i>=list.length){ if(chips) setChips(chips); return; }
      const t=typing();
      setTimeout(()=>{ t.remove(); add(list[i++],'in'); setTimeout(nxt, 350); }, 650+Math.random()*350);
    })();
  }

  function handle(text){
    text=(text||'').trim(); if(!text) return;
    add(text,'out'); inp.value=''; setChips([]);
    if(res){ reservaFlow(text); return; }
    const t=text.toLowerCase();

    if(/(atendente|humano|pessoa|equipe|falar com)/.test(t)){
      botSay('Claro! Você pode falar com a nossa equipe <b>a qualquer hora</b>, é só tocar aqui 👇'+btn(WA_HUMANO,'💬 Falar no WhatsApp'),['Ver cardápio','Reservar mesa']); return;
    }
    if(/(aqui comigo|reservar aqui|anota)/.test(t)){
      res={step:'pessoas'};
      botSay('Ótimo! Vou anotar sua reserva agora mesmo. 🗓️\nPara quantas pessoas?',['2','4','6','8 ou mais']); return;
    }
    if(/(pelo whatsapp)/.test(t)){
      botSay('Perfeito! Toca aqui pra reservar pelo WhatsApp 👇'+btn(RESERVA_URL,'🗓️ Reservar pelo WhatsApp'),['Ver cardápio','Horário',HUMANO]); return;
    }
    if(/(reserv|mesa|marcar)/.test(t)){
      botSay('Posso cuidar da sua reserva de dois jeitos: eu mesmo <b>já anoto tudo aqui no chat</b>, ou te levo direto pro <b>WhatsApp</b>. Como você prefere?',['Reservar aqui comigo','Reservar pelo WhatsApp',HUMANO]); return;
    }
    if(/(card[aá]pio|menu|comer|comida|prato|petisc|drink|bebida|o que tem|pre[cç]o|quanto)/.test(t)){
      botSay('Aqui está o nosso cardápio completo, com entradas, porções, cortes, pratos, burguers, drinks e mais 🍷👇'+btn(CARDAPIO_URL,'📖 Ver cardápio')+'\n\nQuer que eu já reserve sua mesa também?',['Reservar mesa','Horário',HUMANO]); return;
    }
    if(/(hor[aá]rio|que horas|abre|fecha|funciona|aberto)/.test(t)){
      botSay('Nosso horário de funcionamento 🕐\n\n'+HORARIO+'\n\nSexta e sábado costuma lotar, então vale reservar 👇'+btn(RESERVA_URL,'🗓️ Reservar mesa'),['Ver cardápio','Onde fica',HUMANO]); return;
    }
    if(/(onde|endere[cç]o|local|fica|chegar|mapa|localiza)/.test(t)){
      botSay('Estamos na <b>'+ENDERECO+'</b> 📍\nO point da boemia de Uberaba! 👇'+btn(MAPS_URL,'📍 Ver no mapa'),['Ver cardápio','Reservar mesa',HUMANO]); return;
    }
    if(/(ol[aá]|oi|boa noite|bom dia|boa tarde|e a[ií]|tudo bem)/.test(t)){
      botSay('Opa! Seja bem-vindo(a) ao <b>Vila Madalena Bar</b> 🍻\nPosso te mandar o cardápio, reservar sua mesa ou passar horário e localização. E se preferir, você fala com a equipe quando quiser. Como posso ajudar?',['Ver cardápio','Reservar mesa','Horário',HUMANO]); return;
    }
    // fallback
    botSay('Boa pergunta! Posso te passar pra nossa equipe pra te atender certinho, a qualquer hora 👇'+btn(WA_HUMANO,'💬 Falar com atendente')+'\n\nOu, se preferir, dá uma olhada no cardápio ou reserve sua mesa.',['Ver cardápio','Reservar mesa']);
  }

  send.onclick=()=>handle(inp.value);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')handle(inp.value);});

  // abertura
  setTimeout(()=>botSay(['Boa noite! Aqui é o atendente do <b>Vila Madalena Bar</b> 🍻',
    'Posso te mandar o <b>cardápio</b>, fazer sua <b>reserva</b>, passar <b>horário</b> e <b>localização</b>. E se preferir, você fala com a nossa equipe a qualquer momento. Como posso ajudar?'],
    ['Ver cardápio','Reservar mesa','Horário',HUMANO]), 400);
</script>
</body>
</html>
