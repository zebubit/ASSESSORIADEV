<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Atendente IA В· Kayronn Paiva Hair & Beauty (demo)</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#141011;--bg2:#1b1416;--card:#221a1c;--gold:#caa06a;--gold2:#e7c98f;--rose:#e2b3ac;--wa:#25d366;
    --text:#f5ece7;--muted:#bda9a2;--line:rgba(202,160,106,.2)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Manrope',system-ui,sans-serif;background:
    radial-gradient(1000px 600px at 50% -10%,#2a1c1e 0%,var(--bg) 55%),var(--bg);
    color:var(--text);min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px}

  .demo-wrap{width:100%;max-width:440px}
  .demo-tag{text-align:center;color:var(--muted);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
  .demo-tag b{color:var(--gold2)}

  .phone{background:#0f0a0b;border:1px solid var(--line);border-radius:26px;overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,.6);display:flex;flex-direction:column;height:min(760px,86vh)}
  .head{background:linear-gradient(180deg,#241a1c,#180f11);display:flex;align-items:center;gap:12px;padding:15px 16px;border-bottom:1px solid var(--line)}
  .av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--rose));
    display:flex;align-items:center;justify-content:center;color:#241206;font-family:'Playfair Display',serif;font-weight:700;font-size:20px}
  .hname{font-family:'Playfair Display',serif;font-size:17px;line-height:1.1}
  .hname small{display:block;font-family:'Manrope';color:var(--wa);font-size:12px;font-weight:500;margin-top:2px}

  .body{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;
    background-image:radial-gradient(rgba(255,255,255,.02) 1px,transparent 1px);background-size:16px 16px}
  .bub{max-width:84%;padding:10px 14px;border-radius:15px;font-size:14.5px;line-height:1.45;white-space:pre-line;animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .bub.in{background:#2a2023;border:1px solid var(--line);border-bottom-left-radius:4px;align-self:flex-start}
  .bub.out{background:#0b3d2b;border:1px solid rgba(37,211,102,.25);border-bottom-right-radius:4px;align-self:flex-end;color:#dffbe9}
  .bub.in b{color:var(--gold2)}
  .typing{align-self:flex-start;display:flex;gap:5px;padding:12px 15px;background:#2a2023;border:1px solid var(--line);border-radius:15px;border-bottom-left-radius:4px}
  .typing span{width:7px;height:7px;border-radius:50%;background:#bda9a2;animation:blink 1.1s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

  .chips{display:flex;gap:8px;flex-wrap:wrap;padding:0 14px 10px}
  .chip{background:rgba(202,160,106,.1);border:1px solid var(--line);color:var(--gold2);font-size:13px;font-weight:600;
    padding:8px 14px;border-radius:50px;cursor:pointer;transition:.2s}
  .chip:hover{background:rgba(202,160,106,.2);border-color:var(--gold)}

  .lnk{display:inline-flex;align-items:center;gap:7px;margin-top:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));
    color:#241206;font-weight:700;font-size:13.5px;padding:9px 15px;border-radius:11px;text-decoration:none}

  .inbar{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line);background:#120c0d}
  .inbar input{flex:1;background:#221a1c;border:1px solid var(--line);border-radius:50px;color:var(--text);
    padding:11px 16px;font-size:14px;font-family:'Manrope';outline:none}
  .inbar input:focus{border-color:var(--gold)}
  .inbar button{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));
    color:#241206;font-size:18px;cursor:pointer;flex:0 0 auto}

  .note{text-align:center;color:var(--muted);font-size:11.5px;margin-top:12px;line-height:1.5}
  .note b{color:var(--gold2)}
</style>
</head>
<body>
  <div class="demo-wrap">
    <div class="demo-tag">DemonstraГ§ГЈo В· Atendente de IA <b>Zebubit</b></div>
    <div class="phone">
      <div class="head">
        <div class="av">K</div>
        <div class="hname">Kayronn Paiva В· Hair & Beauty<small>в—Ҹ online agora</small></div>
      </div>
      <div class="body" id="chat"></div>
      <div class="chips" id="chips"></div>
      <div class="inbar">
        <input id="inp" placeholder="Escreva sua mensagem..." autocomplete="off">
        <button id="send" aria-label="Enviar">вһӨ</button>
      </div>
    </div>
    <div class="note">DemonstraГ§ГЈo do Atendente de IA da <b>Zebubit</b> para o Kayronn Paiva Hair & Beauty.<br>Agendamentos e dГәvidas respondidos automaticamente no WhatsApp, 24h.</div>
  </div>

<script>
  const chat=document.getElementById('chat'), chipsEl=document.getElementById('chips'),
        inp=document.getElementById('inp'), send=document.getElementById('send');

  /* ====== CONFIG (troque pelas URLs/infos reais) ====== */
  const WHATS='553492909815';                                   // WhatsApp do Kayronn
  const PORTFOLIO_URL='https://www.instagram.com/kayronnpaiva.hair';  // portfГіlio (Instagram 24,6 mil)
  const SITE_URL='https://zebubit.github.io/kayronn-paiva/';    // site com serviГ§os/transformaГ§Гөes
  const AGENDA_URL='https://wa.me/'+WHATS+'?text='+encodeURIComponent('OlГЎ! Quero agendar um horГЎrio no Kayronn Paiva');
  const MAPS_URL='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent('Kayronn Paiva Beauty Experience, R. SГЈo SebastiГЈo, 460, SГЈo SebastiГЈo, Uberaba MG 38060-350');
  const WA_HUMANO='https://wa.me/'+WHATS+'?text='+encodeURIComponent('Oi! Vim pelo atendimento e quero falar com a equipe');
  const ENDERECO='R. SГЈo SebastiГЈo, 460 - SГЈo SebastiГЈo, Uberaba - MG, 38060-350';
  const HORARIO='рҹ—“пёҸ Segunda a sexta: 8h Г s 19h\nрҹ—“пёҸ SГЎbado: 9h Г s 19h\nрҹҡ« Domingo: fechado';
  /* ==================================================== */

  const btn=(url,txt)=>'<br><a class="lnk" href="'+url+'" target="_blank" rel="noopener">'+txt+'</a>';
  const HUMANO='Falar com atendente';

  function add(text,who){const b=document.createElement('div');b.className='bub '+who;b.innerHTML=text;chat.appendChild(b);chat.scrollTop=chat.scrollHeight;return b;}
  function typing(){const t=document.createElement('div');t.className='typing';t.innerHTML='<span></span><span></span><span></span>';chat.appendChild(t);chat.scrollTop=chat.scrollHeight;return t;}
  function setChips(arr){chipsEl.innerHTML='';(arr||[]).forEach(c=>{const s=document.createElement('div');s.className='chip';s.textContent=c;s.onclick=()=>handle(c);chipsEl.appendChild(s);});}

  function botSay(msgs,chips){
    const list=Array.isArray(msgs)?msgs:[msgs];
    setChips([]);
    let i=0;
    (function nxt(){
      if(i>=list.length){ if(chips) setChips(chips); return; }
      const t=typing();
      setTimeout(()=>{ t.remove(); add(list[i++],'in'); setTimeout(nxt, 350); }, 650+Math.random()*350);
    })();
  }

  let ag=null;
  function agendaFlow(text){
    if(ag.step==='servico'){ ag.servico=text; ag.step='dia';
      botSay('Que chique! <b>'+ag.servico+'</b> вңЁ\nPara qual dia fica melhor?',['Quinta','Sexta','SГЎbado','Outro dia']); return; }
    if(ag.step==='dia'){ ag.dia=text; ag.step='hora';
      botSay('Anotado: <b>'+ag.dia+'</b>. E qual horГЎrio vocГӘ prefere?',['9h','11h','14h','16h']); return; }
    if(ag.step==='hora'){ ag.hora=text; ag.step='nome';
      botSay('Perfeito! Por Гәltimo, me diz o seu <b>nome</b> рҹ’ҮвҖҚвҷҖпёҸ'); return; }
    if(ag.step==='nome'){ ag.nome=text.replace(/[^\wГҖ-Гә\s]/g,'').trim()||'Cliente'; const r=ag; ag=null;
      botSay(['вң… <b>Agendamento marcado!</b>\nрҹ’ҮвҖҚвҷҖпёҸ '+r.servico+'\nрҹ—“пёҸ '+r.dia+' Г s '+r.hora+'\nрҹ‘Ө '+r.nome,
        'JГЎ reservei seu horГЎrio e avisei a equipe. Vai ficar linda! вңЁ\nQualquer mudanГ§a, Г© sГі me chamar por aqui.'],
        ['Ver transformaГ§Гөes','Onde fica',HUMANO]); return; }
  }

  function handle(text){
    text=(text||'').trim(); if(!text) return;
    add(text,'out'); inp.value=''; setChips([]);
    if(ag){ agendaFlow(text); return; }
    const t=text.toLowerCase();

    if(/(atendente|humano|pessoa|equipe|falar com)/.test(t)){
      botSay('Claro! VocГӘ pode falar com a nossa equipe <b>a qualquer hora</b>, Г© sГі tocar aqui рҹ‘Ү'+btn(WA_HUMANO,'рҹ’¬ Falar no WhatsApp'),['Ver serviГ§os','Agendar horГЎrio']); return;
    }
    if(/(aqui comigo|agendar aqui|agenda aqui|marca aqui)/.test(t)){
      ag={step:'servico'};
      botSay('Que Гіtimo! Vou agendar pra vocГӘ agora mesmo. вңЁ\nQual serviГ§o vocГӘ deseja? (loiro, terapia capilar, corte, coloraГ§ГЈo)',['Loiros','Terapia capilar','Corte','ColoraГ§ГЈo']); return;
    }
    if(/(pelo whatsapp)/.test(t)){
      botSay('Perfeito! Toca aqui pra agendar pelo WhatsApp рҹ‘Ү'+btn(AGENDA_URL,'рҹ’ҮвҖҚвҷҖпёҸ Agendar pelo WhatsApp'),['Ver serviГ§os','HorГЎrio',HUMANO]); return;
    }
    if(/(agend|marcar|hor[aГЎ]rio dispon|reserv)/.test(t)){
      botSay('Posso agendar seu horГЎrio de dois jeitos: eu mesmo <b>jГЎ marco tudo aqui no chat</b>, ou te levo direto pro <b>WhatsApp</b>. Como prefere?',['Agendar aqui comigo','Agendar pelo WhatsApp',HUMANO]); return;
    }
    if(/(loiro|balayage|iluminad)/.test(t)){
      botSay('Os <b>Loiros SaudГЎveis</b> sГЈo o nosso carro-chefe рҹ’ӣ loiro dos sonhos sem detonar o fio, com tГ©cnica e terapia capilar junto. Quer agendar sua avaliaГ§ГЈo?',['Agendar horГЎrio','Ver transformaГ§Гөes',HUMANO]); return;
    }
    if(/(terapia|tratament|hidrata|cronograma)/.test(t)){
      botSay('A <b>Terapia Capilar</b> devolve saГәde, brilho e forГ§a pro cabelo вңЁ Ideal antes ou depois de quГӯmica. Quer marcar uma avaliaГ§ГЈo?',['Agendar horГЎrio','Ver serviГ§os',HUMANO]); return;
    }
    if(/(corte|visagism)/.test(t)){
      botSay('No <b>Corte & Visagismo</b> a gente estuda seu rosto e estilo pra achar o corte perfeito pra vocГӘ рҹ’ҮвҖҚвҷҖпёҸ Quer agendar?',['Agendar horГЎrio','Ver transformaГ§Гөes',HUMANO]); return;
    }
    if(/(color|ruivo|morena|tinta|mechas)/.test(t)){
      botSay('Fazemos <b>coloraГ§ГЈo</b> completa: balayage, ruivo acobreado, morena iluminada, mel & caramelo рҹҺЁ sempre cuidando da saГәde do fio. Bora agendar?',['Agendar horГЎrio','Ver serviГ§os',HUMANO]); return;
    }
    if(/(servi[cГ§]o|o que faz|especialidad|menu|faz o que)/.test(t)){
      botSay('Nossas especialidades вңЁ:\nвҖў <b>Loiros SaudГЎveis</b> (carro-chefe)\nвҖў <b>Terapia Capilar</b>\nвҖў <b>Corte & Visagismo</b>\nвҖў <b>ColoraГ§ГЈo</b> (balayage, ruivo, morena iluminada)\n\nVeja transformaГ§Гөes reais рҹ‘Ү'+btn(PORTFOLIO_URL,'рҹ“ё Ver no Instagram')+'\n\nQuer agendar uma avaliaГ§ГЈo?',['Agendar horГЎrio','PreГ§os',HUMANO]); return;
    }
    if(/(pre[cГ§]o|valor|quanto|custa|tabela)/.test(t)){
      botSay('Como cada cabelo Г© Гәnico, o valor depende do <b>comprimento</b> e do que vocГӘ quer fazer рҹ’ӣ Por isso fazemos uma <b>avaliaГ§ГЈo personalizada</b>, sem compromisso, e te passamos tudo certinho. Quer que eu jГЎ agende a sua?',['Agendar horГЎrio','Ver serviГ§os',HUMANO]); return;
    }
    if(/(hor[aГЎ]rio|que horas|abre|fecha|funciona|aberto)/.test(t)){
      botSay('Nosso horГЎrio de atendimento (com hora marcada) рҹ•җ\n\n'+HORARIO+'\n\nQuer que eu jГЎ reserve o seu?',['Agendar horГЎrio','Onde fica',HUMANO]); return;
    }
    if(/(onde|endere[cГ§]o|local|fica|chegar|mapa|localiza)/.test(t)){
      botSay('Estamos na <b>'+ENDERECO+'</b> рҹ“Қрҹ‘Ү'+btn(MAPS_URL,'рҹ“Қ Ver no mapa'),['Agendar horГЎrio','Ver serviГ§os',HUMANO]); return;
    }
    if(/(transforma|antes.*depois|portf[oГі]lio|foto|resultado|instagram)/.test(t)){
      botSay('DГЎ uma olhada nas transformaГ§Гөes reais das nossas clientes рҹҳҚрҹ‘Ү'+btn(PORTFOLIO_URL,'рҹ“ё Ver no Instagram'),['Agendar horГЎrio','Ver serviГ§os',HUMANO]); return;
    }
    if(/(ol[aГЎ]|oi|boa noite|bom dia|boa tarde|e a[iГӯ]|tudo bem)/.test(t)){
      botSay('Oi, tudo bem? рҹ’ӣ Aqui Г© o atendente do <b>Kayronn Paiva Hair & Beauty</b> вңЁ\nPosso te mostrar os serviГ§os, agendar seu horГЎrio ou passar preГ§o, horГЎrio e localizaГ§ГЈo. E se preferir, vocГӘ fala com a equipe quando quiser. Como posso te ajudar?',['Ver serviГ§os','Agendar horГЎrio','PreГ§os',HUMANO]); return;
    }
    // fallback
    botSay('Boa pergunta! Posso te passar pra nossa equipe pra te atender certinho, a qualquer hora рҹ‘Ү'+btn(WA_HUMANO,'рҹ’¬ Falar com atendente')+'\n\nOu, se preferir, veja os serviГ§os ou agende seu horГЎrio.',['Ver serviГ§os','Agendar horГЎrio']);
  }

  send.onclick=()=>handle(inp.value);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')handle(inp.value);});

  setTimeout(()=>botSay(['Oi, tudo bem? рҹ’ӣ Aqui Г© o atendente do <b>Kayronn Paiva Hair & Beauty</b> вңЁ',
    'Posso te mostrar os <b>serviГ§os</b>, <b>agendar seu horГЎrio</b>, passar <b>preГ§o</b>, <b>horГЎrio</b> e <b>localizaГ§ГЈo</b>. E se preferir, vocГӘ fala com a equipe a qualquer momento. Como posso te ajudar?'],
    ['Ver serviГ§os','Agendar horГЎrio','PreГ§os',HUMANO]), 400);
</script>
</body>
</html>
