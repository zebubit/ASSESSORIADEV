<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Atendente IA · Primal Pound (demo)</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0b0c;--bg2:#151214;--card:#1a1517;--red:#c8121e;--red2:#e6202d;--wa:#25d366;
    --text:#e9e2e0;--muted:#9c8f8c;--line:rgba(200,18,30,.28)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Manrope',system-ui,sans-serif;background:
    radial-gradient(1000px 600px at 50% -10%,#2a0a0d 0%,var(--bg) 55%),var(--bg);
    color:var(--text);min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px}

  .demo-wrap{width:100%;max-width:440px}
  .demo-tag{text-align:center;color:var(--muted);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
  .demo-tag b{color:var(--red2)}

  .phone{background:#0a0809;border:1px solid var(--line);border-radius:26px;overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,.6),0 0 0 1px rgba(200,18,30,.1);display:flex;flex-direction:column;height:min(760px,86vh)}
  .head{background:linear-gradient(180deg,#1c1416,#120c0d);display:flex;align-items:center;gap:12px;padding:15px 16px;border-bottom:1px solid var(--line)}
  .av{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--red),var(--red2));
    display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:22px}
  .hname{font-family:'Oswald',sans-serif;font-size:18px;line-height:1.1;letter-spacing:.5px;text-transform:uppercase}
  .hname small{display:block;font-family:'Manrope';color:var(--wa);font-size:12px;font-weight:500;margin-top:3px;text-transform:none;letter-spacing:0}

  .body{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;
    background-image:radial-gradient(rgba(255,255,255,.02) 1px,transparent 1px);background-size:16px 16px}
  .bub{max-width:84%;padding:10px 14px;border-radius:15px;font-size:14.5px;line-height:1.45;white-space:pre-line;animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .bub.in{background:#241a1c;border:1px solid var(--line);border-bottom-left-radius:4px;align-self:flex-start}
  .bub.out{background:#0b3d2b;border:1px solid rgba(37,211,102,.25);border-bottom-right-radius:4px;align-self:flex-end;color:#dffbe9}
  .bub.in b{color:var(--red2)}
  .typing{align-self:flex-start;display:flex;gap:5px;padding:12px 15px;background:#241a1c;border:1px solid var(--line);border-radius:15px;border-bottom-left-radius:4px}
  .typing span{width:7px;height:7px;border-radius:50%;background:#9c8f8c;animation:blink 1.1s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

  .chips{display:flex;gap:8px;flex-wrap:wrap;padding:0 14px 10px}
  .chip{background:rgba(200,18,30,.12);border:1px solid var(--line);color:#f0a3a8;font-size:13px;font-weight:600;
    padding:8px 14px;border-radius:50px;cursor:pointer;transition:.2s}
  .chip:hover{background:rgba(200,18,30,.25);border-color:var(--red)}

  .lnk{display:inline-flex;align-items:center;gap:7px;margin-top:8px;background:linear-gradient(135deg,var(--red),var(--red2));
    color:#fff;font-weight:700;font-size:13.5px;padding:9px 15px;border-radius:11px;text-decoration:none}
  .lnk.wa{background:linear-gradient(135deg,var(--wa),#1eae57);color:#08110a}

  .inbar{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line);background:#0e0a0b}
  .inbar input{flex:1;background:#1a1517;border:1px solid var(--line);border-radius:50px;color:var(--text);
    padding:11px 16px;font-size:14px;font-family:'Manrope';outline:none}
  .inbar input:focus{border-color:var(--red)}
  .inbar button{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--red),var(--red2));
    color:#fff;font-size:18px;cursor:pointer;flex:0 0 auto}

  .note{text-align:center;color:var(--muted);font-size:11.5px;margin-top:12px;line-height:1.5}
  .note b{color:var(--red2)}
</style>
</head>
<body>
  <div class="demo-wrap">
    <div class="demo-tag">Demonstração · Atendente de IA <b>Zebubit</b></div>
    <div class="phone">
      <div class="head">
        <div class="av">P</div>
        <div class="hname">Primal Pound<small>● online agora</small></div>
      </div>
      <div class="body" id="chat"></div>
      <div class="chips" id="chips"></div>
      <div class="inbar">
        <input id="inp" placeholder="Escreva sua mensagem..." autocomplete="off">
        <button id="send" aria-label="Enviar">➤</button>
      </div>
    </div>
    <div class="note">Demonstração do Atendente de IA da <b>Zebubit</b> para a Primal Pound.<br>Tira dúvida, monta o pedido e fecha a venda no WhatsApp, 24h.</div>
  </div>

<script>
  const chat=document.getElementById('chat'), chipsEl=document.getElementById('chips'),
        inp=document.getElementById('inp'), send=document.getElementById('send');

  /* ====== CONFIG (troque pelas URLs/infos reais) ====== */
  const WHATS='5534997791499';                                  // WhatsApp da Primal Pound
  const CATALOGO_URL='https://wa.me/'+WHATS+'?text='+encodeURIComponent('Quero ver o catálogo completo da Primal Pound');
  const VIP_URL='https://chat.whatsapp.com/D7hRuZ4taedHS0M02R4cJR';  // grupo VIP de ofertas
  const INSTA_URL='https://www.instagram.com/primal.pound';
  const WA_HUMANO='https://wa.me/'+WHATS+'?text='+encodeURIComponent('Oi! Vim pelo atendimento e quero falar com a equipe');
  const pedidoURL=(txt)=>'https://wa.me/'+WHATS+'?text='+encodeURIComponent(txt);
  /* ==================================================== */

  const btn=(url,txt,cls)=>'<br><a class="lnk '+(cls||'')+'" href="'+url+'" target="_blank" rel="noopener">'+txt+'</a>';
  const HUMANO='Falar com atendente';

  function add(text,who){const b=document.createElement('div');b.className='bub '+who;b.innerHTML=text;chat.appendChild(b);chat.scrollTop=chat.scrollHeight;return b;}
  function typing(){const t=document.createElement('div');t.className='typing';t.innerHTML='<span></span><span></span><span></span>';chat.appendChild(t);chat.scrollTop=chat.scrollHeight;return t;}
  function setChips(arr){chipsEl.innerHTML='';(arr||[]).forEach(c=>{const s=document.createElement('div');s.className='chip';s.textContent=c;s.onclick=()=>handle(c);chipsEl.appendChild(s);});}

  function botSay(msgs,chips){
    const list=Array.isArray(msgs)?msgs:[msgs];
    setChips([]);
    let i=0;
    (function nxt(){
      if(i>=list.length){ if(chips) setChips(chips); return; }
      const t=typing();
      setTimeout(()=>{ t.remove(); add(list[i++],'in'); setTimeout(nxt, 350); }, 600+Math.random()*300);
    })();
  }

  let ped=null;
  function pedidoFlow(text){
    if(ped.step==='produto'){ ped.produto=text; ped.step='qtd';
      botSay('Fechou! 🔥 <b>'+ped.produto+'</b>. Quantas unidades?',['1','2','3','Kit completo']); return; }
    if(ped.step==='qtd'){ ped.qtd=text; const p=ped; ped=null;
      const msg='Quero fazer um pedido na Primal Pound: '+p.qtd+' x '+p.produto;
      botSay(['Pedido montado, guerreiro! 💪\n🛒 '+p.qtd+' x '+p.produto,
        'É só finalizar aqui que a equipe combina o pagamento e a entrega (retira na loja ou recebe em casa) 👇'+btn(pedidoURL(msg),'✅ Fechar pedido no WhatsApp','wa')],
        ['Ver catálogo','Grupo VIP',HUMANO]); return; }
  }

  function handle(text){
    text=(text||'').trim(); if(!text) return;
    add(text,'out'); inp.value=''; setChips([]);
    if(ped){ pedidoFlow(text); return; }
    const t=text.toLowerCase();

    if(/(atendente|humano|pessoa|equipe|falar com)/.test(t)){
      botSay('Fechado! Fala com a equipe a <b>qualquer hora</b>, é só tocar aqui 👇'+btn(WA_HUMANO,'💬 Falar no WhatsApp','wa'),['Ver catálogo','Fazer pedido']); return;
    }
    if(/(kit|destaque|combo|reveal)/.test(t)){
      botSay('O queridinho é o <b>Kit Whey + Creatina</b> com <b>desconto especial de lançamento</b> 🔥 o combo que não pode faltar no seu shape. Bora garantir?',['Fazer pedido','Ver catálogo',HUMANO]); return;
    }
    if(/(fazer pedido|comprar|pedido|quero comprar|montar)/.test(t)){
      ped={step:'produto'};
      botSay('Bora montar teu arsenal! 💪🐺\nQual produto você quer? (whey, creatina, pré-treino ou o Kit destaque)',['Whey','Creatina','Pré-treino','Kit destaque']); return;
    }
    if(/(whey|prote[ií]na)/.test(t)){
      botSay('<b>Whey</b> é base pra quem leva o shape a sério 💪 temos as melhores marcas. Quer que eu já monte seu pedido?',['Fazer pedido','Ver catálogo',HUMANO]); return;
    }
    if(/(creatina)/.test(t)){
      botSay('<b>Creatina</b> é força e performance no treino 🔥 uma das mais pedidas. Bora adicionar no pedido?',['Fazer pedido','Kit destaque',HUMANO]); return;
    }
    if(/(pr[eé].?treino|pump|energia|foco)/.test(t)){
      botSay('<b>Pré-treino</b> pra você entrar na alcateia com tudo: foco, energia e pump 💥 Quer garantir o seu?',['Fazer pedido','Ver catálogo',HUMANO]); return;
    }
    if(/(cat[aá]logo|produto|tem o que|valor|pre[cç]o|quanto|lista)/.test(t)){
      botSay('A gente tem whey, creatina, pré-treino, bebidas e muito mais 💪 Confere o catálogo completo com os valores 👇'+btn(CATALOGO_URL,'📋 Ver catálogo','wa')+'\n\nOu me diz o que você quer que eu já monto seu pedido!',['Fazer pedido','Kit destaque',HUMANO]); return;
    }
    if(/(vip|grupo|oferta|promo|desconto)/.test(t)){
      botSay('Entra no <b>Grupo VIP</b> e recebe as ofertas exclusivas antes de todo mundo 🐺 sem spam, só oportunidade 👇'+btn(VIP_URL,'🔥 Entrar no Grupo VIP'),['Ver catálogo','Fazer pedido',HUMANO]); return;
    }
    if(/(entrega|frete|receb|retir|loja|onde|endere[cç]o)/.test(t)){
      botSay('Você <b>retira na loja</b> ou <b>recebe em casa</b> 🚚 A equipe combina tudo com você no fechamento do pedido. Quer montar o seu?',['Fazer pedido','Ver catálogo',HUMANO]); return;
    }
    if(/(instagram|foto|@)/.test(t)){
      botSay('Acompanha a alcateia no Instagram 📸👇'+btn(INSTA_URL,'📸 Ver no Instagram'),['Ver catálogo','Fazer pedido',HUMANO]); return;
    }
    if(/(ol[aá]|oi|boa noite|bom dia|boa tarde|e a[ií]|tudo bem|salve)/.test(t)){
      botSay('Salve, guerreiro! 🐺🔥 Aqui é o atendente da <b>Primal Pound</b>.\nPosso te mostrar o catálogo, montar seu pedido, te colocar no Grupo VIP de ofertas ou combinar a entrega. E se quiser, fala com a equipe quando precisar. Bora?',['Ver catálogo','Fazer pedido','Grupo VIP',HUMANO]); return;
    }
    // fallback
    botSay('Boa! Já te passo pra equipe pra resolver certinho, a qualquer hora 👇'+btn(WA_HUMANO,'💬 Falar com atendente','wa')+'\n\nOu me diz o que você quer que eu monto seu pedido.',['Ver catálogo','Fazer pedido']);
  }

  send.onclick=()=>handle(inp.value);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')handle(inp.value);});

  setTimeout(()=>botSay(['Salve, guerreiro! 🐺🔥 Aqui é o atendente da <b>Primal Pound</b> · Suplementos & Lifestyle.',
    'Posso te mostrar o <b>catálogo</b>, montar seu <b>pedido</b>, te colocar no <b>Grupo VIP</b> de ofertas ou combinar a <b>entrega</b>. E se quiser, fala com a equipe quando precisar. Como posso ajudar?'],
    ['Ver catálogo','Fazer pedido','Grupo VIP',HUMANO]), 400);
</script>
</body>
</html>
